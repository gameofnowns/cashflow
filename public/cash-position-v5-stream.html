<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOWN — Cashflows v5 Stream</title>
<style>
  :root {
    --bg:#EAE6DF;--ink:#1A1814;--sub:#6B6560;--dim:#A09890;--ghost:#C8C2B8;
    --orange:#FE6337;--blue:#0086D5;--green:#82D780;--yellow:#FAE791;
    --terracotta:#BD6A55;--sage:#8F9A8F;--blue-grey:#D8E1EB;--bronze:#887550;
    --blush:#F7E5DF;--red:#C0392B;
    --grid:1px solid #1A1814;
    --font:'Replica','Helvetica Neue',Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.0;display:flex;flex-direction:column;}

  /* ─── ROW 1 ────────────────────────────────────────────── */
  .r1{display:flex;align-items:center;gap:0;border-bottom:var(--grid);flex-shrink:0;}
  .r1-logo{padding:10px 18px;border-right:var(--grid);display:flex;align-items:center;}
  .r1-logo svg{height:24px;width:auto;}
  .r1-metrics{display:flex;align-items:center;gap:0;flex:1;}
  .r1-m{display:flex;flex-direction:column;align-items:flex-end;padding:8px 16px;border-right:var(--grid);}
  .r1-m:last-child{border-right:none;}
  .r1-ml{font-size:7.5px;color:var(--dim);letter-spacing:0.5px;line-height:1.4;}
  .r1-mv{font-size:16px;font-weight:700;letter-spacing:1px;line-height:1.2;}
  .r1-neg{color:var(--terracotta);} .r1-pos{color:#4a9e5c;}
  .r1-sep{color:var(--dim);font-weight:400;margin:0 2px;font-size:11px;}
  .r1-syncs{display:flex;gap:8px;padding:0 12px;font-size:8px;color:var(--dim);align-items:center;}
  .r1-sync{display:flex;align-items:center;gap:3px;cursor:pointer;}
  .r1-sync:hover{color:var(--ink);}
  .r1-dot{width:5px;height:5px;display:inline-block;}
  .r1-dot.ok{background:var(--green);} .r1-dot.off{background:var(--terracotta);}
  .r1-ts{font-size:6.5px;color:var(--ghost);padding:0 8px;}
  .r1-btn{font-size:7px;padding:4px 10px;background:transparent;border:var(--grid);color:var(--dim);cursor:pointer;letter-spacing:0.5px;margin-right:8px;}
  .r1-btn:hover{border-color:var(--orange);color:var(--orange);}

  /* ─── ROW 2 ────────────────────────────────────────────── */
  .r2{display:flex;align-items:center;gap:6px;padding:8px 18px;border-bottom:var(--grid);flex-shrink:0;flex-wrap:wrap;}
  .r2-label{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:var(--dim);margin-right:4px;}
  .r2-btn{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:4px 10px;border:var(--grid);background:transparent;color:var(--ink);cursor:pointer;transition:all 100ms;}
  .r2-btn.active{background:var(--ink);color:var(--bg);}
  .r2-btn:hover{background:var(--orange);color:#fff;}
  .r2-btn .dot{display:inline-block;width:5px;height:5px;margin-right:3px;vertical-align:middle;}
  .r2-sep{width:1px;height:16px;background:var(--ghost);margin:0 4px;}
  .r2-pipe{font-size:7px;color:var(--ghost);padding:0 2px;}
  /* Chart mode toggle — joined pair */
  .r2-mode{display:flex;overflow:hidden;border:var(--grid);}
  .r2-mode-btn{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;background:transparent;color:var(--dim);cursor:pointer;border:none;border-right:var(--grid);transition:all 100ms;}
  .r2-mode-btn:last-child{border-right:none;}
  .r2-mode-btn.active{background:var(--ink);color:var(--orange);}
  .r2-mode-btn:hover{color:var(--orange);}
  .r2-bal{display:flex;align-items:center;gap:4px;margin-left:auto;font-size:8px;color:var(--dim);}
  .r2-bal input{width:70px;background:transparent;border:var(--grid);padding:2px 5px;font-size:8px;color:var(--ink);}
  .r2-bal input:focus{outline:1px solid var(--orange);}
  .r2-bal button{font-size:7px;padding:2px 6px;border:var(--grid);background:transparent;color:var(--dim);cursor:pointer;}

  /* ─── TICKER ───────────────────────────────────────────── */
  .ticker{display:flex;align-items:center;background:var(--ink);border-bottom:var(--grid);height:22px;overflow:hidden;flex-shrink:0;transition:opacity 200ms,height 200ms;}
  .ticker.faded{opacity:0.3;height:18px;}
  .ticker-scroll{display:flex;align-items:center;white-space:nowrap;animation:ticker-scroll 50s linear infinite;}
  .ticker:hover .ticker-scroll{animation-play-state:paused;}
  @keyframes ticker-scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
  .ti{display:flex;align-items:center;gap:4px;padding:0 14px;font-size:7.5px;color:var(--ghost);letter-spacing:0.3px;cursor:pointer;}
  .ti:hover{color:#fff;}
  .ti-dot{width:4px;height:4px;flex-shrink:0;}
  .ti-dot.critical{background:var(--terracotta);} .ti-dot.warning{background:var(--orange);}
  .ti-dot.info{background:var(--blue);} .ti-dot.positive{background:var(--green);}
  .ti-v{font-weight:600;}
  .ti-v.critical{color:var(--terracotta);} .ti-v.warning{color:var(--orange);} .ti-v.positive{color:var(--green);}

  /* ─── COMMAND LINE ─────────────────────────────────────── */
  .cmd-container{border-bottom:var(--grid);display:flex;flex-direction:column;max-height:32px;transition:max-height 300ms ease;overflow:hidden;flex-shrink:0;}
  .cmd-container.open{max-height:280px;}
  .cmd-response{background:#E8E4DF;flex:1;overflow-y:auto;padding:0;display:none;border-top:var(--grid);}
  .cmd-container.open .cmd-response{display:block;padding:10px 14px;}
  .cmd-msg{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(0,0,0,0.06);}
  .cmd-msg:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .cmd-msg-q{font-size:9px;color:var(--ink);font-weight:700;margin-bottom:6px;}
  .cmd-msg-q::before{content:'> ';opacity:0.5;}
  .cmd-msg-a pre{font-size:10px;line-height:1.8;color:var(--ink);white-space:pre-wrap;}
  .cmd-msg-tags{margin-top:6px;}
  .tag{font-size:7px;padding:1px 4px;margin-right:4px;}
  .tag-exact{background:rgba(0,134,213,0.15);color:var(--blue);}
  .tag-clickup{background:rgba(130,215,128,0.15);color:#4a9e5c;}
  .tag-dynamics{background:rgba(254,99,55,0.15);color:var(--orange);}
  .cmd-loading{padding:6px 0;font-size:9px;color:var(--ink);opacity:0.6;}
  .cmdline{display:flex;align-items:center;padding:6px 18px;flex-shrink:0;border-top:var(--grid);}
  .cmd-container.open .cmdline{background:var(--ink);}
  .cmd-prompt{color:var(--orange);font-size:10px;margin-right:8px;user-select:none;font-weight:700;}
  .cmd-input{flex:1;background:transparent;border:none;font-size:10px;color:var(--ink);outline:none;letter-spacing:0.5px;}
  .cmd-container.open .cmd-input{color:#e8e4d9;}
  .cmd-input::placeholder{color:var(--ghost);}
  .cmd-kbd{font-size:7px;color:var(--ghost);padding:2px 5px;border:1px solid var(--ghost);cursor:pointer;}
  .cmd-collapse{font-size:7px;color:var(--ghost);padding:3px 8px;border:1px solid var(--ghost);cursor:pointer;margin-left:6px;display:none;letter-spacing:1px;}
  .cmd-container.open .cmd-collapse{display:inline-block;}
  .cmd-collapse:hover{color:var(--orange);border-color:var(--orange);}

  /* ─── SETUP BANNER ──────────────────────────────────────── */
  .setup-banner{border-bottom:var(--grid);display:none;flex-shrink:0;}
  .setup-banner.show{display:block;}
  .setup-header{padding:10px 18px;background:var(--ink);color:var(--bg);display:flex;align-items:center;justify-content:space-between;}
  .setup-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:3px;}
  .setup-dismiss{font-size:8px;color:var(--ghost);cursor:pointer;padding:4px 8px;border:1px solid var(--ghost);letter-spacing:1px;}
  .setup-dismiss:hover{color:var(--orange);border-color:var(--orange);}
  .setup-body{display:flex;gap:0;}
  .setup-card{flex:1;padding:14px 18px;border-right:var(--grid);display:flex;align-items:center;gap:12px;}
  .setup-card:last-child{border-right:none;}
  .setup-card-dot{width:8px;height:8px;flex-shrink:0;}
  .setup-card-dot.ok{background:var(--green);}
  .setup-card-dot.off{background:var(--terracotta);}
  .setup-card-dot.warn{background:var(--orange);}
  .setup-card-info{flex:1;}
  .setup-card-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:2px;}
  .setup-card-detail{font-size:8px;color:var(--dim);line-height:1.4;}
  .setup-card-detail.ok{color:var(--green);}
  .setup-card-btn{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:6px 14px;border:var(--grid);background:transparent;color:var(--ink);cursor:pointer;transition:all 100ms;flex-shrink:0;}
  .setup-card-btn:hover{background:var(--orange);color:#fff;border-color:var(--orange);}
  .setup-card-btn.connected{background:var(--ink);color:var(--bg);cursor:default;}
  /* Login overlay */
  .login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:1000;display:none;align-items:center;justify-content:center;}
  .login-overlay.show{display:flex;}
  .login-box{text-align:center;width:320px;}
  .login-logo{margin-bottom:24px;}
  .login-title{font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:6px;margin-bottom:8px;}
  .login-sub{font-size:9px;color:var(--dim);margin-bottom:24px;letter-spacing:0.3px;}
  .login-input{width:100%;padding:10px 14px;border:var(--grid);background:transparent;font-size:11px;font-weight:700;letter-spacing:1px;text-align:center;margin-bottom:12px;}
  .login-input:focus{outline:2px solid var(--orange);}
  .login-input::placeholder{color:var(--ghost);font-weight:300;}
  .login-btn{width:100%;padding:10px;background:var(--ink);color:var(--bg);border:none;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:background 150ms;}
  .login-btn:hover{background:var(--orange);}
  .login-error{font-size:9px;color:var(--terracotta);margin-top:8px;}

  /* ─── CHART AREA — fills remaining viewport ────────────── */
  .chart-area{flex:1;min-height:200px;position:relative;overflow:hidden;border-bottom:var(--grid);}
  .chart-canvas{position:absolute;top:0;left:120px;right:0;bottom:0;border-left:var(--grid);}
  .y-tick{position:absolute;right:calc(100% + 8px);font-size:7.5px;font-weight:300;color:var(--dim);letter-spacing:0.5px;transform:translateY(-50%);white-space:nowrap;}
  .grid-h{position:absolute;left:0;right:0;height:1px;background:var(--ghost);}
  .zero-line{position:absolute;left:0;right:0;height:1px;background:var(--dim);opacity:0.6;}
  .bar-seg{min-height:1px;transition:opacity 150ms;cursor:pointer;position:absolute;}
  .bar-seg:hover{opacity:0.7;}
  .line-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  /* Stream SVG */
  .stream-svg{position:absolute;top:0;left:0;width:100%;height:100%;}
  .stream-band{transition:opacity 200ms;}
  .stream-band:hover{opacity:0.85;}
  /* Stream tooltip — matches dashboard brand */
  .scan-line{position:absolute;top:0;bottom:0;width:1px;background:var(--orange);opacity:0;pointer-events:none;z-index:15;will-change:transform;}
  .cash-ring{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid var(--orange);background:rgba(254,99,55,0.1);pointer-events:none;z-index:16;opacity:0;margin-left:-7px;margin-top:-7px;will-change:transform;transition:opacity 150ms;}
  .stream-tt{position:absolute;background:var(--bg);border:var(--grid);padding:0;z-index:20;pointer-events:none;min-width:220px;max-width:300px;opacity:0;will-change:transform,opacity;transition:opacity 100ms ease;overflow:hidden;}
  .stt-header{padding:6px 12px;background:var(--ink);color:var(--bg);display:flex;justify-content:space-between;align-items:center;}
  .stt-time{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:2px;}
  .stt-net{font-size:11px;font-weight:700;}
  .stt-body{padding:0;}
  .stt-section{border-bottom:1px solid var(--ghost);}
  .stt-section:last-child{border-bottom:none;}
  .stt-section-label{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--sub);padding:4px 12px;border-bottom:1px solid var(--ghost);display:flex;align-items:center;gap:4px;}
  .stt-section-dot{width:5px;height:5px;display:inline-block;}
  .stt-item{display:flex;align-items:center;gap:6px;padding:3px 12px;font-size:9px;border-bottom:1px solid rgba(0,0,0,0.04);}
  .stt-item:last-child{border-bottom:none;}
  .stt-name{color:var(--ink);font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:0.5px;}
  .stt-job{color:var(--dim);font-size:8px;font-weight:300;}
  .stt-amt{font-weight:700;white-space:nowrap;text-align:right;min-width:70px;letter-spacing:0.5px;}
  .stt-cash{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:rgba(26,24,20,0.06);font-size:9px;border-top:var(--grid);}
  .stt-cash-label{color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;font-size:7px;}
  .stt-cash-val{font-weight:700;letter-spacing:0.5px;}
  /* Toast */
  .toast{position:absolute;bottom:12px;right:12px;background:var(--bg);border:1px solid var(--orange);padding:8px 12px;font-size:9px;color:var(--sub);max-width:240px;line-height:1.5;z-index:10;display:none;}
  .toast.show{display:block;animation:toast-in 300ms ease;}
  .toast.critical{border-color:var(--terracotta);}
  .toast strong{color:var(--orange);}
  .toast.critical strong{color:var(--terracotta);}
  .toast-action{color:var(--orange);cursor:pointer;margin-top:4px;display:block;font-size:8px;letter-spacing:0.5px;}
  .toast-x{position:absolute;top:4px;right:6px;color:var(--ghost);cursor:pointer;font-size:10px;}
  @keyframes toast-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* ─── P&L TABLE ────────────────────────────────────────── */
  .pnl-wrap{overflow-x:auto;border-bottom:var(--grid);flex-shrink:0;}
  .pnl{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed;min-width:900px;}
  .pnl th{padding:6px 8px;font-weight:700;font-size:7px;text-transform:uppercase;letter-spacing:2px;line-height:1.4;border-right:var(--grid);border-bottom:var(--grid);text-align:right;white-space:nowrap;}
  .pnl th:first-child{text-align:left;width:120px;min-width:120px;max-width:120px;position:sticky;left:0;background:var(--bg);z-index:2;}
  .pnl th.mh{color:var(--bg);background:var(--ink);cursor:pointer;transition:background 150ms;}
  .pnl th.mh:hover{background:var(--orange);}
  .pnl th.mh.exp{background:var(--orange);color:var(--ink);}
  .pnl th.th{color:var(--bg);background:var(--ink);}
  .pnl td{padding:5px 8px;border-right:var(--grid);font-weight:700;letter-spacing:1px;text-align:right;font-size:9px;white-space:nowrap;}
  .pnl td:first-child{text-align:left;letter-spacing:2px;position:sticky;left:0;z-index:1;font-size:10px;}
  .pnl .ghost{color:var(--ghost);}
  .pnl .fc{color:var(--terracotta);}
  .row-car td{background:rgba(130,215,128,0.06);} .row-car td:first-child{background:rgba(130,215,128,0.06);}
  .row-bar td{background:rgba(0,134,213,0.06);} .row-bar td:first-child{background:rgba(0,134,213,0.06);}
  .row-com td{background:rgba(216,225,235,0.12);} .row-com td:first-child{background:rgba(216,225,235,0.12);}
  .row-in-total td{background:rgba(130,215,128,0.10);border-bottom:var(--grid);} .row-in-total td:first-child{background:rgba(130,215,128,0.10);}
  .row-ap td{background:rgba(192,57,43,0.06);} .row-ap td:first-child{background:rgba(192,57,43,0.06);}
  .row-cogs td{background:rgba(136,117,80,0.06);} .row-cogs td:first-child{background:rgba(136,117,80,0.06);}
  .row-vat td{background:rgba(143,154,143,0.06);} .row-vat td:first-child{background:rgba(143,154,143,0.06);}
  .row-oh td{background:rgba(247,229,223,0.15);} .row-oh td:first-child{background:rgba(247,229,223,0.15);}
  .row-out-total td{background:rgba(192,57,43,0.08);border-bottom:var(--grid);} .row-out-total td:first-child{background:rgba(192,57,43,0.08);}
  .row-net td{background:rgba(254,99,55,0.06);border-bottom:var(--grid);} .row-net td:first-child{background:rgba(254,99,55,0.06);}
  .row-cash td{background:rgba(26,24,20,0.06);border-top:2px solid var(--ink);}
  .row-cash td:first-child{background:var(--ink);color:var(--bg);}
  .cell-neg{background:var(--ink) !important;color:var(--orange) !important;font-weight:700 !important;}
  .pnl td:last-child{border-left:1px solid rgba(26,24,20,0.1);}

  /* ─── DETAIL (below fold) ──────────────────────────────── */
  .detail-area{overflow-y:auto;}
  .detail{border-bottom:var(--grid);}
  .detail-hero{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:var(--grid);}
  .detail-title{font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:6px;line-height:0.70;}
  .detail-close{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:8px 16px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;}
  .detail-close:hover{background:var(--orange);color:#fff;}
  .detail-sub{padding:8px 18px;font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--sub);border-bottom:1px solid var(--ghost);}
  .dt{width:100%;border-collapse:collapse;font-size:10px;}
  .dt th{padding:6px 12px;font-weight:700;font-size:7px;text-transform:uppercase;letter-spacing:2.5px;color:var(--bg);background:var(--ink);border-right:1px solid var(--sub);border-bottom:var(--grid);text-align:left;}
  .dt th:last-child{border-right:none;} .dt th.r{text-align:right;}
  .dt td{padding:5px 12px;border-right:var(--grid);border-bottom:var(--grid);font-weight:700;color:var(--ink);}
  .dt td:last-child{border-right:none;} .dt td.r{text-align:right;}
  .dt tr:hover td{background:rgba(254,99,55,0.06);}
  .pay-bar{display:flex;height:10px;border:1px solid var(--ink);width:100%;min-width:60px;}
  .pay-bar .paid{background:var(--green);height:100%;} .pay-bar .out{background:var(--blue);height:100%;}
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-logo"><svg width="164" height="22" viewBox="0 0 328 41" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M65.4138 0H76.3161V24.2839C76.3161 31.1677 72.3342 37.047 65.8835 39.6833C59.4327 42.3195 52.4042 40.9378 47.4664 36.0712L39.752 28.4617L10.9023 0H26.3185L55.1682 28.4576L65.4096 38.5599V0H65.4138ZM317.098 0H328V24.2839C328 31.1677 324.018 37.047 317.567 39.6833C311.117 42.3195 304.088 40.9378 299.15 36.0712L291.436 28.4617L262.586 0V40.9993H251.684V0H278.002L306.852 28.4576L317.094 38.5599V0H317.098ZM158.077 0H147.175V24.2839C147.175 31.1677 151.157 37.047 157.607 39.6833C164.058 42.3195 171.087 40.9378 176.025 36.0712L183.739 28.4617L186.345 25.8911C186.914 32.0738 190.763 37.2561 196.703 39.6833C203.154 42.3195 210.182 40.9378 215.12 36.0712L222.834 28.4617L251.684 0H236.268L207.418 28.4576L197.177 38.5599V15.2067L212.589 0H197.172L168.323 28.4576L158.081 38.5599V0H158.077ZM133.55 9.40935H89.9408V31.59H133.55V9.40935ZM98.4574 0H125.029C135.724 0 144.448 8.60576 144.448 19.1549V21.8444C144.448 32.3936 135.724 40.9993 125.029 40.9993H98.4574C87.7629 40.9993 79.0386 32.3936 79.0386 21.8444V19.1549C79.0386 8.60576 87.7629 0 98.4574 0ZM0 0H10.9023V40.9993H0V0Z" fill="#1A1814"/></svg></div>
    <div class="login-title">CASHFLOWS</div>
    <div class="login-sub">enter password to continue</div>
    <input class="login-input" id="login-pw" type="password" placeholder="password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- SETUP BANNER -->
<div class="setup-banner" id="setup-banner">
  <div class="setup-header">
    <span class="setup-title">Connect Data Sources</span>

<script>
const API=window.location.origin;
const EUR=(n)=>{if(n==null||isNaN(n))return'—';const a=Math.abs(n);const f=a.toLocaleString('de-DE',{minimumFractionDigits:0,maximumFractionDigits:0});return(n<0?'- ':'')+'EUR '+f;};
const K=(n)=>{const a=Math.abs(n);const s=n<0?'-':'';if(a>=1e6)return s+(a/1e6).toFixed(1)+'M';if(a>=1e3)return s+Math.round(a/1e3)+'K';return s+Math.round(a);};
const sm=(mk)=>{const[y,mo]=mk.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1]+' '+y.slice(2);};

let D=null,EXP=null;
let MODE=localStorage.getItem('nown-chart-mode')||'stream';
let T={currentAr:true,billableAr:true,phase3:true,ap:true,cogsWon:true,cogsPipeline:true,vat:true,overhead:true,weighted:false};

// Series colors — single source of truth
const COLORS={currentAr:'#82D780',billableAr:'#0086D5',committed:'#D8E1EB',vat:'#8F9A8F',ap:'#C0392B',cogsWon:'#887550',cogsPipeline:'#BD6A55',overhead:'#F7E5DF'};

function setMode(m){MODE=m;localStorage.setItem('nown-chart-mode',m);render();}
function tog(id){T[id]=!T[id];render();}
function preset(n){const a=(v)=>{for(const k in T)T[k]=v;T.weighted=false;};if(n==='c'){a(true);T.phase3=false;T.cogsPipeline=false;}else if(n==='l')a(true);else if(n==='f')a(true);else if(n==='w'){a(true);T.weighted=true;}render();}

function compute(){
  if(!D)return[];
  const w=T.weighted;
  return D.months.map(m=>{
    const cAr=T.currentAr?m.currentAr:0,bAr=T.billableAr?m.billableAr:0;
    const p3=T.phase3?(w?m.pipelinePhase3*0.9:m.pipelinePhase3):0;
    const vat=T.vat?m.vatReturn:0,ap=T.ap?(m.ap||0):0;
    const cW=T.cogsWon?m.cogsWon:0;
    let cP=0;if(T.cogsPipeline&&T.phase3)cP=w?m.cogsPhase3*0.9:m.cogsPhase3;
    const oh=T.overhead?m.overhead:0;
    const inf=cAr+bAr+p3+vat,out=ap+cW+cP+oh;
    return{month:m.month,currentAr:cAr,billableAr:bAr,committed:p3,ap,cogsWon:cW,cogsPipeline:cP,vat,overhead:oh,inflow:inf,outflow:out,net:inf-out,_:m};
  });
}

function render(){
  if(!D)return;
  const c=compute();
  let cash=D.bankBalance;const cb=c.map(m=>{cash+=m.net;return cash;});
  const tIn=c.reduce((s,m)=>s+m.inflow,0),tOut=c.reduce((s,m)=>s+m.outflow,0);
  const m3=c.slice(0,3).reduce((s,m)=>s+m.net,0);
  const end=D.bankBalance+c.reduce((s,m)=>s+m.net,0);
  const bank=D.bankBalance;

  // Metrics
  document.getElementById('metrics').innerHTML=`
    <div class="r1-m"><span class="r1-ml">OPENING</span><span class="r1-mv">${K(bank)}</span></div>
    <div class="r1-m"><span class="r1-ml">3M</span><span class="r1-mv ${bank+m3<0?'r1-neg':''}">${K(bank+m3)}</span></div>
    <div class="r1-m"><span class="r1-ml">12M</span><span class="r1-mv ${end<0?'r1-neg':''}">${K(end)}</span></div>
    <div class="r1-m"><span class="r1-ml">IN / OUT</span><span class="r1-mv"><span class="r1-pos">${K(tIn)}</span><span class="r1-sep">/</span><span class="r1-neg">${K(tOut)}</span></span></div>
    <div class="r1-m"><span class="r1-ml">NET</span><span class="r1-mv ${tIn-tOut<0?'r1-neg':'r1-pos'}">${K(tIn-tOut)}</span></div>`;

  // Row 2 with mode toggle
  const tb=(id,label,color,active)=>`<button class="r2-btn ${active?'active':''}" onclick="tog('${id}')">${color?`<span class="dot" style="background:${color}"></span>`:''}${label}</button>`;
  document.getElementById('row2').innerHTML=`
    <span class="r2-label">Presets</span>
    <button class="r2-btn" onclick="preset('c')">Conserv.</button>
    <button class="r2-btn" onclick="preset('l')">Likely</button>
    <button class="r2-btn" onclick="preset('f')">Full</button>
    <button class="r2-btn" onclick="preset('w')">Weighted</button>
    <div class="r2-sep"></div>
    ${tb('currentAr','AR','#82D780',T.currentAr)}
    ${tb('billableAr','Billable','#0086D5',T.billableAr)}
    ${tb('phase3','Commit','#D8E1EB',T.phase3)}
    <span class="r2-pipe">|</span>
    ${tb('ap','AP','#C0392B',T.ap)}
    ${tb('cogsWon','COGS','#887550',T.cogsWon)}
    ${tb('overhead','OH','#F7E5DF',T.overhead)}
    ${tb('vat','VAT','#8F9A8F',T.vat)}
    <div class="r2-sep"></div>
    <div class="r2-mode"><button class="r2-mode-btn ${MODE==='bars'?'active':''}" onclick="setMode('bars')">▮ BARS</button><button class="r2-mode-btn ${MODE==='stream'?'active':''}" onclick="setMode('stream')">〰 STREAM</button></div>
    <div class="r2-sep"></div>
    ${tb('weighted','Weighted','',T.weighted)}
    <div class="r2-bal"><span>BAL</span><input id="bank-input" value="${Math.round(bank)}" onkeydown="if(event.key==='Enter')loadAll()"><button onclick="loadAll()">SET</button></div>`;

  renderTicker(c,cb);
  renderPNL(c,cb); // Table first so chart can read column positions
  if(MODE==='bars') renderBars(c,cb);
  else renderStream(c,cb);
  renderToast(c,cb);
}

// ─── Ticker ─────────────────────────────────────────────────
function renderTicker(c,cb){
  const items=[];
  const oi=(D.months[0]?.currentArItems||[]);
  if(oi.length>0){const t=oi.reduce((s,i)=>s+i.amount,0);items.push({sev:'critical',label:'OVERDUE',val:`${oi.length} inv / EUR ${K(t)}`});}
  const ni=cb.findIndex(v=>v<0);items.push({sev:ni<0?'positive':ni>3?'info':'warning',label:'RUNWAY',val:`${ni<0?12:ni} months`});
  const apt=c.reduce((s,m)=>s+m.ap,0);if(apt>0)items.push({sev:'info',label:'AP',val:`EUR ${K(apt)}`});
  const p3t=c.reduce((s,m)=>s+m.committed,0);if(p3t>0)items.push({sev:'info',label:'PIPELINE P3',val:`EUR ${K(p3t)}`});
  const tIn=c.reduce((s,m)=>s+m.inflow,0);
  c.forEach(m=>{if(m.inflow>tIn*0.3&&m.inflow>200000)items.push({sev:'warning',label:sm(m.month).toUpperCase(),val:`EUR ${K(m.inflow)} concentration`});});
  const h=items.map(i=>`<div class="ti"><span class="ti-dot ${i.sev}"></span>${i.label} <span class="ti-v ${i.sev}">${i.val}</span></div>`).join('<span style="color:#6B6560;font-size:7px;padding:0 4px">·</span>');
  document.getElementById('ticker').innerHTML=`<div class="ticker-scroll">${h}${h}</div>`;
}
function tickerFade(on){document.getElementById('ticker').classList.toggle('faded',on);}

// ─── Shared: get column positions from table ────────────────
function getColPositions(el,c){
  const tbl=document.getElementById('pnl'),ths=tbl?tbl.querySelectorAll('thead th'):[],cr=el.getBoundingClientRect();
  const n=c.length,W=el.offsetWidth,cols=[];
  if(ths.length>=n+1){for(let i=1;i<=n;i++){const r=ths[i].getBoundingClientRect();cols.push({x:r.left+r.width/2-cr.left,w:r.width});}}
  else{const s=W/(n+1);for(let i=0;i<n;i++)cols.push({x:(i+0.5)*s,w:s});}
  return cols;
}

// ─── Shared: scale + grid ───────────────────────────────────
function calcScale(c,cb,H){
  const bank=D.bankBalance;
  let maxUp=0,maxDown=0;c.forEach(m=>{maxUp=Math.max(maxUp,m.inflow);maxDown=Math.max(maxDown,m.outflow);});
  let cashMax=bank,cashMin=bank,cash=bank;c.forEach(m=>{cash+=m.net;cashMax=Math.max(cashMax,cash);cashMin=Math.min(cashMin,cash);});
  const above=Math.max(maxUp,cashMax,0)*1.1,below=Math.max(maxDown,cashMin<0?Math.abs(cashMin):0)*1.1;
  const mA=Math.max(above,(above+below)*0.15),mB=Math.max(below,(above+below)*0.15);
  const range=mA+mB||1,zeroY=(mA/range)*H,scale=H/range;
  return{zeroY,scale,mA,mB};
}

function renderGrid(el,H,zeroY,scale,mA,mB){
  const mt=Math.max(mA,mB),raw=mt/5,mag=Math.pow(10,Math.floor(Math.log10(raw||1)));
  const ns=[1,2,5,10].map(m=>m*mag).find(s=>mt/s<=6)||mag*10;
  let gh='';
  for(let v=ns;v<=mA;v+=ns){const y=zeroY-v*scale;if(y<5)break;gh+=`<div class="y-tick" style="top:${y}px">${K(v)}</div><div class="grid-h" style="top:${y}px"></div>`;}
  for(let v=ns;v<=mB;v+=ns){const y=zeroY+v*scale;if(y>H-5)break;gh+=`<div class="y-tick" style="top:${y}px">${K(-v)}</div><div class="grid-h" style="top:${y}px"></div>`;}
  gh+=`<div class="zero-line" style="top:${zeroY}px"></div><div class="y-tick" style="top:${zeroY}px;font-weight:700">0</div>`;
  return gh;
}

function renderCashLine(el,c,cb,cols,zeroY,scale,W,H){
  const bank=D.bankBalance;
  let cash=bank;const pts=c.map((m,i)=>{cash+=m.net;return{x:cols[i].x,y:zeroY-cash*scale,cash};});
  const sy=zeroY-bank*scale,sx=cols[0].x-cols[0].w/2;
  let d=`M ${sx} ${sy}`;pts.forEach(p=>{d+=` L ${p.x} ${p.y}`;});
  let svg=`<svg class="line-overlay" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="#1A1814" stroke-width="3.5"/>`;
  pts.forEach(p=>{svg+=`<circle cx="${p.x}" cy="${p.y}" r="5" fill="#EAE6DF" stroke="#1A1814" stroke-width="2"/>`;});
  svg+=`</svg>`;
  el.innerHTML+=svg;
  el.innerHTML+=`<div style="position:absolute;left:${sx-4}px;top:${sy-14}px;font-size:8px;font-weight:700;letter-spacing:1px">${K(bank)}</div>`;
  const lp=pts[pts.length-1];
  el.innerHTML+=`<div style="position:absolute;left:${lp.x+6}px;top:${lp.y-6}px;font-size:8px;font-weight:700;letter-spacing:1px;color:${lp.cash<0?'var(--terracotta)':'var(--ink)'}">${K(lp.cash)}</div>`;
}

// ─── BAR CHART ──────────────────────────────────────────────
function renderBars(c,cb){
  const el=document.getElementById('chart');el.innerHTML='';
  const H=el.offsetHeight||380,W=el.offsetWidth||800;
  const{zeroY,scale,mA,mB}=calcScale(c,cb,H);
  el.innerHTML=renderGrid(el,H,zeroY,scale,mA,mB);
  const cols=getColPositions(el,c);
  const bw=Math.min(36,(cols[0]?.w||60)-8);

  c.forEach((m,i)=>{
    const x=cols[i].x;
    [{v:m.currentAr,c:'#82D780'},{v:m.billableAr,c:'#0086D5'},{v:m.committed,c:'#D8E1EB'},{v:m.vat,c:'#8F9A8F'}].filter(p=>p.v>0).reduce((cum,p)=>{
      const h=p.v*scale;el.innerHTML+=`<div class="bar-seg" style="left:${x-bw/2}px;top:${zeroY-cum-h}px;width:${bw}px;height:${h}px;background:${p.c};border:1px solid var(--ink)" title="${EUR(p.v)}"></div>`;return cum+h;},0);
    [{v:m.ap,c:'#C0392B'},{v:m.cogsWon,c:'#887550'},{v:m.cogsPipeline,c:'#BD6A55'},{v:m.overhead,c:'#F7E5DF'}].filter(p=>p.v>0).reduce((cum,p)=>{
      const h=p.v*scale;el.innerHTML+=`<div class="bar-seg" style="left:${x-bw/2}px;top:${zeroY+cum}px;width:${bw}px;height:${h}px;background:${p.c};border:1px solid var(--ink)" title="${EUR(-p.v)}"></div>`;return cum+h;},0);
  });
  renderCashLine(el,c,cb,cols,zeroY,scale,W,H);
}

// ─── STREAMGRAPH ────────────────────────────────────────────
function bell(center,peak,width,res){
  const curve=new Array(res).fill(0);
  for(let i=0;i<res;i++){const t=i/res;const d=(t-center)/width;curve[i]=peak*Math.exp(-d*d*2.5);}
  return curve;
}

function smoothPath(pts){
  if(pts.length<2)return'';
  let d=`M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
  for(let i=1;i<pts.length;i++){
    const p=pts[i-1],c=pts[i],mx=(p.x+c.x)/2;
    d+=` C${mx.toFixed(1)},${p.y.toFixed(1)} ${mx.toFixed(1)},${c.y.toFixed(1)} ${c.x.toFixed(1)},${c.y.toFixed(1)}`;
  }
  return d;
}

function renderStream(c,cb){
  const el=document.getElementById('chart');el.innerHTML='';
  const H=el.offsetHeight||380,W=el.offsetWidth||800;
  const{zeroY,scale,mA,mB}=calcScale(c,cb,H);
  el.innerHTML=renderGrid(el,H,zeroY,scale,mA,mB);
  const cols=getColPositions(el,c);
  const RES=96; // 8 samples per month
  // Compute the actual pixel span of the 12 month columns (excludes FY Total)
  const chartLeft=cols[0].x-cols[0].w/2;
  const chartRight=cols[cols.length-1].x+cols[cols.length-1].w/2;
  const chartSpan=chartRight-chartLeft;

  // Generate bell curves for each series per month
  const inflowLayers=[
    {key:'currentAr',color:COLORS.currentAr,op:0.50,width:0.020},
    {key:'billableAr',color:COLORS.billableAr,op:0.45,width:0.030},
    {key:'committed',color:COLORS.committed,op:0.50,width:0.040},
    {key:'vat',color:COLORS.vat,op:0.30,width:0.035},
  ];
  const outflowLayers=[
    {key:'overhead',color:COLORS.overhead,op:0.40,width:0.035},
    {key:'cogsWon',color:COLORS.cogsWon,op:0.30,width:0.030},
    {key:'cogsPipeline',color:COLORS.cogsPipeline,op:0.20,width:0.030},
    {key:'ap',color:COLORS.ap,op:0.35,width:0.020},
  ];

  // Build composite curves
  function buildCurves(layers,c){
    return layers.map(layer=>{
      const curve=new Array(RES).fill(0);
      c.forEach((m,mi)=>{
        const center=(mi+0.5)/c.length;
        const val=m[layer.key]||0;
        if(val>0){const b=bell(center,val,layer.width,RES);for(let i=0;i<RES;i++)curve[i]+=b[i];}
      });
      return{...layer,curve};
    });
  }

  const inflowCurves=buildCurves(inflowLayers,c);
  const outflowCurves=buildCurves(outflowLayers,c);

  // Stack and render SVG
  let svg=`<svg class="stream-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`;

  // Month separator lines
  for(let i=1;i<c.length;i++){
    const x=cols[i].x-cols[i].w/2;
    svg+=`<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>`;
  }

  // Render inflow streams (stacking upward)
  let inflowBase=new Array(RES).fill(0);
  inflowCurves.forEach(layer=>{
    const topEdge=[],botEdge=[];
    for(let i=0;i<RES;i++){
      const x=chartLeft+(i/RES)*chartSpan;
      const botY=zeroY-inflowBase[i]*scale;
      const topY=zeroY-(inflowBase[i]+layer.curve[i])*scale;
      botEdge.push({x,y:botY});
      topEdge.push({x,y:topY});
    }
    const fwd=smoothPath(topEdge);
    const bwd=smoothPath([...botEdge].reverse());
    const areaD=fwd+` L${botEdge[botEdge.length-1].x.toFixed(1)},${botEdge[botEdge.length-1].y.toFixed(1)} ${bwd.slice(1)} Z`;

    const rgb=hexToRgb(layer.color);
    svg+=`<path class="stream-band" d="${areaD}" fill="rgba(${rgb},${layer.op})" stroke="rgba(${rgb},${layer.op+0.15})" stroke-width="0.5"/>`;

    const peakIdx=layer.curve.indexOf(Math.max(...layer.curve));
    if(peakIdx>=0){
      const peakVal=layer.curve[peakIdx];
      const bandH=peakVal*scale;
      if(bandH>20){
        const px=chartLeft+(peakIdx/RES)*chartSpan;
        const py=zeroY-(inflowBase[peakIdx]+peakVal/2)*scale;
        svg+=`<text x="${px}" y="${py}" text-anchor="middle" font-size="7" font-weight="600" fill="rgba(${rgb},0.9)" font-family="var(--font)">${layer.key==='currentAr'?'Current AR':layer.key==='billableAr'?'Billable':layer.key==='committed'?'Committed':'VAT'}</text>`;
        svg+=`<text x="${px}" y="${py+9}" text-anchor="middle" font-size="6" fill="rgba(0,0,0,0.35)" font-family="var(--font)">${K(peakVal)}</text>`;
      }
    }

    for(let i=0;i<RES;i++)inflowBase[i]+=layer.curve[i];
  });

  // Render outflow streams (stacking downward)
  let outflowBase=new Array(RES).fill(0);
  outflowCurves.forEach(layer=>{
    const topEdge=[],botEdge=[];
    for(let i=0;i<RES;i++){
      const x=chartLeft+(i/RES)*chartSpan;
      const topY=zeroY+outflowBase[i]*scale;
      const botY=zeroY+(outflowBase[i]+layer.curve[i])*scale;
      topEdge.push({x,y:topY});
      botEdge.push({x,y:botY});
    }
    const fwd=smoothPath(botEdge);
    const bwd=smoothPath([...topEdge].reverse());
    const areaD=fwd+` L${topEdge[topEdge.length-1].x.toFixed(1)},${topEdge[topEdge.length-1].y.toFixed(1)} ${bwd.slice(1)} Z`;

    const rgb=hexToRgb(layer.color);
    svg+=`<path class="stream-band" d="${areaD}" fill="rgba(${rgb},${layer.op})" stroke="rgba(${rgb},${layer.op+0.15})" stroke-width="0.5"/>`;

    const peakIdx=layer.curve.indexOf(Math.max(...layer.curve));
    if(peakIdx>=0){
      const peakVal=layer.curve[peakIdx];
      const bandH=peakVal*scale;
      if(bandH>20){
        const px=chartLeft+(peakIdx/RES)*chartSpan;
        const py=zeroY+(outflowBase[peakIdx]+peakVal/2)*scale;
        svg+=`<text x="${px}" y="${py}" text-anchor="middle" font-size="7" font-weight="600" fill="rgba(${rgb},0.9)" font-family="var(--font)">${layer.key==='ap'?'AP':layer.key==='cogsWon'?'COGS':layer.key==='overhead'?'Overhead':'COGS (P)'}</text>`;
        svg+=`<text x="${px}" y="${py+9}" text-anchor="middle" font-size="6" fill="rgba(0,0,0,0.35)" font-family="var(--font)">${K(peakVal)}</text>`;
      }
    }

    for(let i=0;i<RES;i++)outflowBase[i]+=layer.curve[i];
  });

  // Today marker
  const nowFrac=0.03;
  const todayX=chartLeft+nowFrac*chartSpan;
  svg+=`<line x1="${todayX}" y1="0" x2="${todayX}" y2="${H}" stroke="#FE6337" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>`;
  svg+=`<text x="${todayX}" y="10" font-size="6" fill="#FE6337" opacity="0.5" font-family="var(--font)">TODAY</text>`;

  svg+=`</svg>`;
  el.innerHTML+=svg;

  // Cash position line on top
  renderCashLine(el,c,cb,cols,zeroY,scale,W,H);

  // Pre-compute tooltip frames for hover interaction
  precomputeTooltipFrames(c,cb,inflowCurves,outflowCurves,cols,zeroY,scale,W,H,RES);
}

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`;}

// ─── Stream Tooltip System (project-level data) ─────────────
let ttFrames=[];

function precomputeTooltipFrames(c,cb,inflowCurves,outflowCurves,cols,zeroY,scale,W,H,RES){
  const frames=[];
  const bank=D.bankBalance;
  let cash=bank;
  const cashPts=c.map((m,i)=>{cash+=m.net;return{x:cols[i].x,y:zeroY-cash*scale,cash};});
  // Use same chart span as SVG rendering
  const cLeft=cols[0].x-cols[0].w/2;
  const cRight=cols[cols.length-1].x+cols[cols.length-1].w/2;
  const cSpan=cRight-cLeft;

  // Build per-project bell curves for inflows (for tooltip detail)
  // Each project gets its own bell centered on its expected date
  const projectBells=[];
  c.forEach((m,mi)=>{
    const raw=m._;
    const center=(mi+0.5)/c.length;
    // Current AR items
    (raw.currentArItems||[]).forEach(item=>{
      const b=bell(center,item.amount,0.020,RES);
      projectBells.push({name:item.projectName,jobNo:item.jobNo,amount:item.amount,layer:'currentAr',color:COLORS.currentAr,curve:b});
    });
    // Billable AR items
    (raw.billableArItems||[]).forEach(item=>{
      const b=bell(center,item.amount,0.030,RES);
      projectBells.push({name:item.projectName,jobNo:item.jobNo,amount:item.amount,layer:'billableAr',color:COLORS.billableAr,curve:b});
    });
    // Committed (Phase 3) items
    (raw.pipelinePhase3Items||[]).forEach(item=>{
      const b=bell(center,item.amount,0.040,RES);
      projectBells.push({name:item.projectName,jobNo:item.jobNo,amount:item.amount,layer:'committed',color:COLORS.committed,curve:b});
    });
    // AP items (outflow)
    (raw.apItems||[]).forEach(item=>{
      const b=bell(center,item.amount,0.020,RES);
      projectBells.push({name:item.projectName,jobNo:null,amount:-item.amount,layer:'ap',color:COLORS.ap,curve:b});
    });
  });

  for(let i=0;i<RES;i++){
    const frac=i/RES;
    const x=cLeft+frac*cSpan;
    const monthIdx=Math.min(11,Math.floor(frac*12));
    const monthName=c[monthIdx]?sm(c[monthIdx].month).split(' ')[0].toUpperCase():'';
    // ISO week number from start of year
    const startDate=new Date(c[0].month+'-01');
    const pointDate=new Date(startDate.getTime()+frac*365.25*24*60*60*1000);
    const oneJan=new Date(pointDate.getFullYear(),0,1);
    const week=Math.ceil(((pointDate.getTime()-oneJan.getTime())/86400000+oneJan.getDay()+1)/7);

    // Aggregate layer totals
    let totalIn=0,totalOut=0;
    inflowCurves.forEach(l=>{totalIn+=(l.curve[i]||0);});
    outflowCurves.forEach(l=>{totalOut+=(l.curve[i]||0);});

    // Sample project bells at this point — get individual projects contributing here
    const projects=[];
    projectBells.forEach(pb=>{
      const val=pb.curve[i]||0;
      if(val<500)return; // significance threshold
      projects.push({name:pb.name,jobNo:pb.jobNo,amount:pb.amount>0?val:-val,layer:pb.layer,color:pb.color});
    });
    projects.sort((a,b)=>Math.abs(b.amount)-Math.abs(a.amount));

    // Group by layer for structured tooltip
    const byLayer={};
    projects.forEach(p=>{
      if(!byLayer[p.layer])byLayer[p.layer]={items:[],color:p.color,total:0};
      byLayer[p.layer].items.push(p);
      byLayer[p.layer].total+=p.amount;
    });

    // Nearest cash point
    let nearestCash=cashPts[0],minDist=Math.abs(x-cashPts[0].x);
    cashPts.forEach(p=>{const d=Math.abs(x-p.x);if(d<minDist){minDist=d;nearestCash=p;}});

    frames.push({x,monthName,week,totalIn,totalOut,net:totalIn-totalOut,byLayer,cashPosition:nearestCash.cash,cashX:nearestCash.x,cashY:nearestCash.y});
  }
  ttFrames=frames;
}

// Layer display names
const LAYER_NAMES={currentAr:'Current AR',billableAr:'Billable AR',committed:'Committed',vat:'VAT Returns',ap:'Accounts Payable',cogsWon:'COGS (Won)',cogsPipeline:'COGS (Pipeline)',overhead:'Overhead'};

// Mouse events
(function(){
  const area=document.querySelector('.chart-area');
  const canvas=document.getElementById('chart');
  const scanEl=document.getElementById('scan-line');
  const ringEl=document.getElementById('cash-ring');
  const ttEl=document.getElementById('stream-tt');
  const ttTime=document.getElementById('stt-time');
  const ttNet=document.getElementById('stt-net');
  const ttBody=document.getElementById('stt-body');
  const ttCash=document.getElementById('stt-cash');

  area.addEventListener('mousemove',(e)=>{
    if(MODE!=='stream'||ttFrames.length===0){scanEl.style.opacity='0';ttEl.style.opacity='0';ringEl.style.opacity='0';return;}
    const areaRect=area.getBoundingClientRect();
    const canvasRect=canvas.getBoundingClientRect();
    // Use canvas position for data mapping, but accept mouse anywhere in chart area
    const mx=e.clientX-canvasRect.left;
    const W=canvasRect.width;
    // Clamp mx to canvas bounds but don't hide — just clamp
    const clampedMx=Math.max(0,Math.min(mx,W));

    const frac=clampedMx/W;
    const idx=Math.round(frac*(ttFrames.length-1));
    const f=ttFrames[Math.max(0,Math.min(idx,ttFrames.length-1))];
    if(!f)return;

    // Scan line — always visible, full height of chart area
    scanEl.style.transform=`translateX(${120+f.x}px)`;
    scanEl.style.opacity='1';

    // Header
    ttTime.textContent=`${f.monthName} · WK ${f.week}`;
    const isPos=f.net>=0;
    ttNet.textContent=`${isPos?'+':'-'} ${K(Math.abs(f.net))} net`;
    ttNet.style.color=isPos?'#4a9e5c':'var(--terracotta)';

    // Body — grouped by layer with project detail
    let bh='';
    const layerOrder=['currentAr','billableAr','committed','ap','overhead','cogsWon','cogsPipeline','vat'];
    layerOrder.forEach(lk=>{
      const layer=f.byLayer[lk];
      if(!layer||layer.items.length===0)return;
      bh+=`<div class="stt-section">`;
      bh+=`<div class="stt-section-label"><span class="stt-section-dot" style="background:${layer.color}"></span>${LAYER_NAMES[lk]||lk}</div>`;
      layer.items.slice(0,4).forEach(item=>{
        const neg=item.amount<0;
        const amtColor=neg?'var(--terracotta)':'var(--ink)';
        const jobTag=item.jobNo?`<span class="stt-job">${item.jobNo}</span>`:'';
        bh+=`<div class="stt-item"><span class="stt-name">${item.name} ${jobTag}</span><span class="stt-amt" style="color:${amtColor}">${neg?'- ':''}${K(Math.abs(item.amount))}</span></div>`;
      });
      if(layer.items.length>4)bh+=`<div class="stt-item" style="color:var(--dim);font-size:8px;padding-left:0">+${layer.items.length-4} more</div>`;
      bh+=`</div>`;
    });
    if(!bh)bh=`<div style="padding:8px 12px;font-size:9px;color:var(--dim)">No significant flows this week</div>`;
    ttBody.innerHTML=bh;

    // Cash position footer
    const cashColor=f.cashPosition>=0?'var(--ink)':'var(--terracotta)';
    ttCash.innerHTML=`<span class="stt-cash-label">Cash Position</span><span class="stt-cash-val" style="color:${cashColor}">${f.cashPosition<0?'- ':''}EUR ${K(Math.abs(f.cashPosition))}</span>`;

    // Position tooltip — always follows cursor X, anchored near top
    const mouseXInArea=e.clientX-areaRect.left;
    const mouseYInArea=e.clientY-areaRect.top;
    const ttW=ttEl.offsetWidth||260;
    const ttH=ttEl.offsetHeight||250;
    const GAP=24;
    // Horizontal: right of cursor, flip left near edge
    let tx=mouseXInArea+GAP;
    if(tx+ttW+12>areaRect.width) tx=mouseXInArea-GAP-ttW;
    tx=Math.max(8,Math.min(tx,areaRect.width-ttW-8));
    // Vertical: follow cursor Y but offset upward, clamp within area
    let ty=mouseYInArea-ttH/2;
    ty=Math.max(8,Math.min(ty,areaRect.height-ttH-8));
    ttEl.style.transform=`translate(${tx}px,${ty}px)`;
    ttEl.style.opacity='1';

    // Cash highlight ring
    ringEl.style.transform=`translate(${120+f.cashX}px,${f.cashY}px)`;
    ringEl.style.opacity='1';
  });

  area.addEventListener('mouseleave',()=>{
    scanEl.style.opacity='0';
    ttEl.style.opacity='0';
    ringEl.style.opacity='0';
  });
})();

// ─── P&L Table ──────────────────────────────────────────────
function renderPNL(c,cb){
  const tbl=document.getElementById('pnl');
  const v=(n,fc)=>n>0?`<span class="${fc?'fc':''}">${EUR(n)}</span>`:(n<0?EUR(n):'<span class="ghost">—</span>');
  const rows=[
    {l:'Current AR',fn:m=>m.currentAr,cls:'row-car'},
    {l:'Billable AR',fn:m=>m.billableAr,cls:'row-bar'},
    {l:'Committed',fn:m=>m.committed,cls:'row-com',fc:true},
    {l:'Total Inflow',fn:m=>m.inflow,cls:'row-in-total'},
    {l:'AP',fn:m=>-m.ap,cls:'row-ap'},
    {l:'COGS',fn:m=>-(m.cogsWon+m.cogsPipeline),cls:'row-cogs'},
    {l:'VAT Returns',fn:m=>m.vat,cls:'row-vat'},
    {l:'Overhead',fn:m=>-m.overhead,cls:'row-oh'},
    {l:'Total Outflow',fn:m=>-m.outflow,cls:'row-out-total'},
    {l:'Net',fn:(m,i)=>m.net,cls:'row-net'},
  ];
  let h='<thead><tr><th></th>';
  c.forEach(m=>{const e=EXP===m.month?' exp':'';h+=`<th class="mh${e}" onclick="drill('${m.month}')">${sm(m.month)}</th>`;});
  h+='<th class="th">FY Total</th></tr></thead><tbody>';
  rows.forEach(r=>{
    h+=`<tr class="${r.cls}"><td>${r.l}</td>`;
    c.forEach((m,i)=>{const val=r.fn(m,i);h+=`<td class="${r.fc?'fc':''}">${v(val,r.fc)}</td>`;});
    const t=c.reduce((s,m,i)=>s+r.fn(m,i),0);h+=`<td>${v(t,r.fc)}</td></tr>`;
  });
  h+=`<tr class="row-cash"><td>Cash Position</td>`;
  cb.forEach(val=>{h+=`<td class="${val<0?'cell-neg':''}">${EUR(val)}</td>`;});
  h+=`<td class="${cb[cb.length-1]<0?'cell-neg':''}">${EUR(cb[cb.length-1])}</td></tr>`;
  h+='</tbody>';tbl.innerHTML=h;
}

function renderToast(c,cb){
  const el=document.getElementById('toast');
  const ni=cb.findIndex(v=>v<0);
  if(ni>=0&&ni<3){el.className='toast show critical';el.innerHTML=`<span class="toast-x" onclick="this.parentElement.classList.remove('show')">✕</span><strong>Cash goes negative in ${sm(c[ni].month)}</strong><br>Projected: ${EUR(cb[ni])}<div class="toast-action" onclick="document.getElementById('cmd').value='why is ${sm(c[ni].month).toLowerCase()} negative';document.getElementById('cmd').focus()">INVESTIGATE →</div>`;}
  else el.classList.remove('show');
}

function drill(mk){
  const panel=document.getElementById('detail');
  if(EXP===mk){EXP=null;panel.style.display='none';document.body.style.overflow='hidden';render();return;}
  EXP=mk;
  const m=D.months.find(m=>m.month===mk);if(!m){render();return;}
  const tot=(items)=>items.reduce((s,i)=>s+i.amount,0);
  const pb=(pct)=>`<div class="pay-bar"><div class="paid" style="width:${pct}%"></div><div class="out" style="width:${100-pct}%"></div></div>`;
  const fd=(iso)=>new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});
  let h=`<div class="detail"><div class="detail-hero"><div class="detail-title">${sm(mk)} BREAKDOWN</div><button class="detail-close" onclick="drill('${mk}')">Close</button></div>`;
  if(m.currentArItems?.length>0){h+=`<div class="detail-sub">Current AR — ${m.currentArItems.length} invoices · ${EUR(tot(m.currentArItems))}</div><table class="dt"><thead><tr><th>Customer</th><th>Invoice</th><th>Job No.</th><th>Due Date</th><th>Status</th><th class="r">Amount</th></tr></thead><tbody>`;m.currentArItems.forEach(i=>{h+=`<tr><td>${i.projectName}</td><td>${i.label}</td><td>${i.jobNo||'—'}</td><td>${fd(i.expectedDate)}</td><td>${i.status}</td><td class="r">${EUR(i.amount)}</td></tr>`;});h+='</tbody></table>';}
  if(m.billableArItems?.length>0){h+=`<div class="detail-sub">Billable AR — ${m.billableArItems.length} milestones · ${EUR(tot(m.billableArItems))}</div><table class="dt"><thead><tr><th>Project</th><th>Type</th><th>Job No.</th><th>Milestone</th><th>Status</th><th style="width:80px">Progress</th><th class="r">Amount</th></tr></thead><tbody>`;m.billableArItems.forEach(i=>{const pct=i.status==='received'?100:i.status==='invoiced'?50:0;h+=`<tr><td>${i.projectName}</td><td>${i.projectType}</td><td>${i.jobNo||'—'}</td><td>${i.label||'—'}</td><td>${i.status}</td><td>${pb(pct)}</td><td class="r">${EUR(i.amount)}</td></tr>`;});h+='</tbody></table>';}
  if(m.pipelinePhase3Items?.length>0){h+=`<div class="detail-sub">Committed Pipeline — ${m.pipelinePhase3Items.length} milestones · ${EUR(tot(m.pipelinePhase3Items))}</div><table class="dt"><thead><tr><th>Opportunity</th><th>Type</th><th>Job No.</th><th>Milestone</th><th>Trigger</th><th style="width:80px">Progress</th><th class="r">Amount</th></tr></thead><tbody>`;m.pipelinePhase3Items.forEach(i=>{h+=`<tr><td>${i.projectName}</td><td>${i.projectType}</td><td>${i.jobNo||'—'}</td><td>${i.label||'—'}</td><td>${i.trigger||'—'}</td><td>${pb(0)}</td><td class="r">${EUR(i.amount)}</td></tr>`;});h+='</tbody></table>';}
  if(m.apItems?.length>0){h+=`<div class="detail-sub">Accounts Payable — ${m.apItems.length} items · ${EUR(tot(m.apItems))}</div><table class="dt"><thead><tr><th>Vendor</th><th>Invoice</th><th>Due Date</th><th class="r">Amount</th></tr></thead><tbody>`;m.apItems.forEach(i=>{h+=`<tr><td>${i.projectName}</td><td>${i.label}</td><td>${fd(i.expectedDate)}</td><td class="r">${EUR(i.amount)}</td></tr>`;});h+='</tbody></table>';}
  h+='</div>';
  panel.innerHTML=h;panel.style.display='block';
  document.body.style.overflow='auto';
  panel.scrollIntoView({behavior:'smooth',block:'start'});
  render();
}

// ─── Chat ───────────────────────────────────────────────────
let chatHistory=[];
function collapseChat(){document.getElementById('cmd-container').classList.remove('open');document.getElementById('cmd').blur();tickerFade(false);}
document.getElementById('cmd').addEventListener('keydown',async(e)=>{
  if(e.key!=='Enter')return;const input=e.target.value.trim();if(!input)return;e.target.value='';
  const container=document.getElementById('cmd-container'),resp=document.getElementById('cmd-resp');
  container.classList.add('open');chatHistory.push({role:'user',content:input});
  const md=document.createElement('div');md.className='cmd-msg';
  md.innerHTML=`<div class="cmd-msg-q">${input}</div><div class="cmd-loading">processing...</div>`;
  resp.appendChild(md);resp.scrollTop=resp.scrollHeight;
  try{
    const res=await fetch(`${API}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistory,context:{bankBalance:D?.bankBalance}})});
    const data=await res.json();md.querySelector('.cmd-loading')?.remove();
    if(data.error){md.innerHTML+=`<div class="cmd-msg-a"><pre style="color:var(--terracotta)">${data.error}</pre></div>`;return;}
    chatHistory.push({role:'assistant',content:data.message});
    const tags=(data.sources||[]).map(s=>`<span class="tag tag-${s}">${s.toUpperCase()}</span>`).join('');
    md.innerHTML+=`<div class="cmd-msg-a"><pre>${data.message}</pre></div>${tags?'<div class="cmd-msg-tags">'+tags+'</div>':''}`;
    resp.scrollTop=resp.scrollHeight;
  }catch(err){md.querySelector('.cmd-loading')?.remove();md.innerHTML+=`<div class="cmd-msg-a"><pre style="color:var(--terracotta)">error: ${err.message}</pre></div>`;}
  e.target.focus();
});

// ─── Keyboard shortcuts ─────────────────────────────────────
window.addEventListener('keydown',(e)=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('cmd').focus();}
  if(e.key==='Escape')collapseChat();
  if(e.key==='/'&&e.target.tagName!=='INPUT'){e.preventDefault();document.getElementById('cmd').focus();}
});

// ─── Data loading ───────────────────────────────────────────
async function loadAll(){
  document.getElementById('ts').textContent=new Date().toLocaleString('nl-NL').toLowerCase();
  const bv=document.getElementById('bank-input')?.value?.trim()||'';
  const params=bv?`?bankBalance=${encodeURIComponent(bv)}`:'';
  try{
    const[dr,sr]=await Promise.all([fetch(`${API}/api/dashboard/cash-position${params}`),fetch(`${API}/api/dashboard/status`)]);
    const data=await dr.json();if(data.error)throw new Error(data.error);
    D=data;if(!bv&&D.bankBalance>0){const inp=document.getElementById('bank-input');if(inp)inp.value=Math.round(D.bankBalance);}
    try{const s=await sr.json();const el=document.getElementById('syncs');const dOk=s.dynamics?.connected&&s.dynamics?.tokenValid;const cOk=s.clickup?.connected&&(s.clickup?.projectsSynced||0)>0;const eOk=s.exact?.connected&&s.exact?.tokenValid;el.innerHTML=`<span class="r1-sync" onclick="runSync('dynamics')"><span class="r1-dot ${dOk?'ok':'off'}"></span>DYN</span><span class="r1-sync" onclick="runSync('clickup')"><span class="r1-dot ${cOk?'ok':'off'}"></span>CU</span><span class="r1-sync" onclick="runSync('exact')"><span class="r1-dot ${eOk?'ok':'off'}"></span>EX</span>`;}catch{}
    render();
  }catch(e){document.getElementById('metrics').innerHTML=`<div class="r1-m"><span class="r1-ml">ERROR</span><span class="r1-mv r1-neg">${e.message}</span></div>`;}
}
async function runSync(p){try{await fetch(`${API}/api/sync/${p}`,{method:'POST'});setTimeout(loadAll,500);}catch{}}

// ─── Login ──────────────────────────────────────────────────
async function checkAuth(){
  try{
    const res=await fetch(`${API}/api/dashboard/status`,{credentials:'include'});
    if(res.status===401||res.status===307||res.redirected){
      document.getElementById('login-overlay').classList.add('show');
      return false;
    }
    return true;
  }catch{return true;} // No auth required if no APP_PASSWORD
}

async function doLogin(){
  const pw=document.getElementById('login-pw').value;
  const errEl=document.getElementById('login-error');
  errEl.textContent='';
  try{
    const res=await fetch(`${API}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw}),credentials:'include'});
    if(res.ok){
      document.getElementById('login-overlay').classList.remove('show');
      loadAll();
    } else {
      errEl.textContent='incorrect password';
    }
  }catch(e){errEl.textContent='connection error';}
}

// ─── Setup Banner ───────────────────────────────────────────
async function checkSetup(){
  try{
    const res=await fetch(`${API}/api/dashboard/status`,{credentials:'include'});
    if(!res.ok)return;
    const s=await res.json();
    if(s.error)return;

    const banner=document.getElementById('setup-banner');
    const body=document.getElementById('setup-body');
    const dOk=s.dynamics?.connected&&s.dynamics?.tokenValid;
    const cOk=s.clickup?.connected&&(s.clickup?.projectsSynced||0)>0;
    const eOk=s.exact?.connected&&s.exact?.tokenValid;

    // If all connected, hide banner
    if(dOk&&cOk&&eOk){banner.classList.remove('show');return;}

    banner.classList.add('show');
    body.innerHTML=`
      <div class="setup-card">
        <span class="setup-card-dot ${eOk?'ok':'off'}"></span>
        <div class="setup-card-info">
          <div class="setup-card-name">Exact Online</div>
          <div class="setup-card-detail ${eOk?'ok':''}">${eOk?'Connected — Bank EUR '+K(s.exact?.bankBalance||0)+', AR '+s.exact?.arItems?.total+' items':'Not connected — AR, AP, bank balance'}</div>
        </div>
        ${eOk?'<span class="setup-card-btn connected">Connected</span>':`<a href="${API}/api/auth/exact" class="setup-card-btn">Connect Exact</a>`}
      </div>
      <div class="setup-card">
        <span class="setup-card-dot ${dOk?'ok':'off'}"></span>
        <div class="setup-card-info">
          <div class="setup-card-name">Dynamics 365</div>
          <div class="setup-card-detail ${dOk?'ok':''}">${dOk?'Connected — '+s.dynamics.projectsSynced+' pipeline opps':'Not connected — quotes, pipeline, payment terms'}</div>
        </div>
        ${dOk?'<span class="setup-card-btn connected">Connected</span>':`<a href="${API}/api/auth/dynamics" class="setup-card-btn">Connect Dynamics</a>`}
      </div>
      <div class="setup-card">
        <span class="setup-card-dot ${cOk?'ok':'off'}"></span>
        <div class="setup-card-info">
          <div class="setup-card-name">ClickUp</div>
          <div class="setup-card-detail ${cOk?'ok':''}">${cOk?'Connected — '+s.clickup.projectsSynced+' projects, '+s.clickup.milestones+' milestones':'No data — sync to pull projects'}</div>
        </div>
        ${cOk?'<span class="setup-card-btn connected">Connected</span>':`<button class="setup-card-btn" onclick="runSync('clickup');setTimeout(checkSetup,3000)">Sync ClickUp</button>`}
      </div>
    `;
  }catch{}
}

// ─── Init ───────────────────────────────────────────────────
(async function init(){
  const authed=await checkAuth();
  if(!authed)return; // Wait for login
  loadAll();
  checkSetup();
})();
</script>
