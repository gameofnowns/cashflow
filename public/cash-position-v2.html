<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOWN — Cashflows</title>
<style>
  :root {
    --bg:#EAE6DF;--ink:#1A1814;--sub:#6B6560;--dim:#A09890;--ghost:#C8C2B8;
    --orange:#FE6337;--blue:#0086D5;--green:#82D780;--yellow:#FAE791;
    --terracotta:#BD6A55;--sage:#8F9A8F;--blue-grey:#D8E1EB;--bronze:#887550;
    --blush:#F7E5DF;
    --grid:1px solid #1A1814;
    --font:'Replica','Helvetica Neue',Arial,sans-serif;
    --mono:'SF Mono','Fira Code',Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.0;}

  /* Header */
  .header{display:flex;align-items:center;padding:0;border-bottom:var(--grid);}
  .header-logo{padding:8px 18px;border-right:var(--grid);display:flex;align-items:center;}
  .header-logo svg{height:24px;width:auto;}
  .header-right{display:flex;align-items:center;gap:14px;margin-left:auto;padding:8px 18px;}
  .timestamp{font-size:7px;font-weight:300;letter-spacing:1.5px;color:var(--dim);}
  .btn{font-family:var(--font);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:8px 16px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;transition:background 150ms;}
  .btn:hover{background:var(--orange);color:#fff;}

  /* Hero bar */
  .hero-bar{display:grid;grid-template-columns:1fr 2fr 1fr;border-bottom:var(--grid);}
  .hero-title{padding:12px 18px;font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:6px;line-height:0.70;border-right:var(--grid);display:flex;align-items:center;}
  .hero-mid{padding:8px 18px;border-right:var(--grid);display:flex;align-items:center;gap:0;}
  .hero-desc{padding:12px 18px;font-size:9px;font-weight:300;letter-spacing:0.3px;line-height:1.7;color:var(--sub);display:flex;align-items:center;}

  /* Status in hero-mid */
  .status-item{display:flex;align-items:center;gap:6px;padding:4px 14px;border-right:1px solid var(--ghost);}
  .status-item:last-child{border-right:none;}
  .status-dot{width:6px;height:6px;display:inline-block;}
  .status-dot.ok{background:var(--green);}
  .status-dot.warn{background:var(--yellow);}
  .status-dot.off{background:var(--terracotta);}
  .status-name{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--sub);}
  .status-detail{font-size:6.5px;font-weight:300;letter-spacing:0.3px;color:var(--dim);}
  .sync-btn{font-family:var(--font);font-size:6.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:2px 6px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;transition:background 150ms;}
  .sync-btn:hover{background:var(--orange);color:#fff;}

  /* KPI strip */
  .kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);border-bottom:var(--grid);}
  .kpi{padding:14px 18px;border-right:var(--grid);}
  .kpi:last-child{border-right:none;}
  .kpi-label{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:3.5px;line-height:1.4;color:var(--sub);margin-bottom:6px;}
  .kpi-value{font-size:22px;font-weight:700;letter-spacing:2px;line-height:0.75;color:var(--ink);font-family:var(--mono);}
  .kpi-caption{font-size:7px;font-weight:300;letter-spacing:1.5px;line-height:1.6;color:var(--dim);margin-top:6px;}

  /* Controls row */
  .controls-row{padding:10px 18px;border-bottom:var(--grid);display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .ctrl-label{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:3.5px;color:var(--sub);margin-right:4px;}
  .ctrl-btn{font-family:var(--font);font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:5px 10px;border:var(--grid);background:transparent;color:var(--ink);cursor:pointer;transition:all 150ms;}
  .ctrl-btn.active{background:var(--ink);color:var(--bg);}
  .ctrl-btn:hover{background:var(--orange);color:#fff;}
  .ctrl-btn .dot{display:inline-block;width:6px;height:6px;margin-right:4px;vertical-align:middle;}
  .ctrl-sep{width:1px;height:24px;background:var(--ghost);margin:0 6px;}
  .bank-input{font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 8px;border:var(--grid);background:var(--bg);color:var(--ink);width:110px;letter-spacing:1px;}
  .bank-input:focus{outline:2px solid var(--orange);}

  /* Chart */
  .chart-section{padding:18px;border-bottom:var(--grid);}
  .chart-title{font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:4px;margin-bottom:4px;}
  .chart-subtitle{font-size:9px;font-weight:300;color:var(--sub);letter-spacing:0.3px;margin-bottom:18px;}
  .chart-canvas{position:relative;height:400px;margin-left:70px;border-left:var(--grid);border-bottom:var(--grid);}
  .chart-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;padding-top:10px;border-top:var(--grid);}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--sub);}
  .legend-dot{width:8px;height:8px;}

  .y-tick{position:absolute;right:calc(100% + 8px);font-size:7.5px;font-weight:300;color:var(--dim);font-family:var(--mono);letter-spacing:0.5px;transform:translateY(-50%);white-space:nowrap;}
  .grid-h{position:absolute;left:0;right:0;height:1px;background:var(--ghost);}
  .zero-line{position:absolute;left:0;right:0;height:1px;background:var(--dim);opacity:0.6;}
  .bar-seg{min-height:1px;transition:opacity 150ms;cursor:pointer;position:absolute;}
  .bar-seg:hover{opacity:0.7;}
  .month-label{position:absolute;bottom:-20px;font-size:7.5px;font-weight:300;color:var(--dim);letter-spacing:0.5px;transform:translateX(-50%);}
  .line-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

  /* Section header */
  .section-header{padding:18px 18px 10px;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:4px;line-height:0.75;border-bottom:var(--grid);}

  /* P&L Table — months as columns */
  .pnl-wrap{overflow-x:auto;border-bottom:var(--grid);}
  .pnl-table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed;min-width:900px;}
  .pnl-table th{padding:10px 10px;font-weight:700;font-size:7.5px;text-transform:uppercase;letter-spacing:2px;line-height:1.4;border-right:var(--grid);border-bottom:var(--grid);text-align:right;white-space:nowrap;}
  .pnl-table th:first-child{text-align:left;width:140px;min-width:140px;position:sticky;left:0;background:var(--bg);z-index:2;}
  .pnl-table th.month-hdr{color:var(--bg);background:var(--ink);cursor:pointer;transition:background 150ms;}
  .pnl-table th.month-hdr:hover{background:var(--orange);}
  .pnl-table th.month-hdr.expanded{background:var(--orange);}
  .pnl-table th.total-hdr{color:var(--bg);background:var(--ink);}
  .pnl-table th.row-hdr{background:var(--bg);color:var(--sub);text-align:left;letter-spacing:3px;}
  .pnl-table td{padding:8px 10px;border-right:var(--grid);border-bottom:1px solid var(--ghost);font-weight:700;letter-spacing:1.5px;font-family:var(--mono);text-align:right;font-size:10px;white-space:nowrap;}
  .pnl-table td:first-child{text-align:left;font-family:var(--font);letter-spacing:2px;position:sticky;left:0;background:var(--bg);z-index:1;}
  .pnl-table tr:hover td{background:rgba(254,99,55,0.06);}
  .pnl-table tr:hover td:first-child{background:rgba(254,99,55,0.06);}
  .pnl-table .row-sep td{border-bottom:var(--grid);font-weight:700;}
  .pnl-table .row-total td{border-top:2px solid var(--ink);font-weight:700;font-size:11px;}
  .pnl-table .ghost{color:var(--ghost);}
  .pnl-table .forecast{color:var(--terracotta);}

  /* Drill-down detail */
  .detail-section{border-bottom:var(--grid);overflow-x:auto;}
  .detail-table{width:100%;border-collapse:collapse;font-size:10px;}
  .detail-table th{padding:8px 12px;font-weight:700;font-size:7px;text-transform:uppercase;letter-spacing:2.5px;color:var(--bg);background:var(--sub);border-right:1px solid var(--dim);border-bottom:var(--grid);text-align:left;}
  .detail-table th:last-child{border-right:none;}
  .detail-table th.right{text-align:right;}
  .detail-table td{padding:6px 12px;border-right:1px solid var(--ghost);border-bottom:1px solid var(--ghost);font-weight:300;letter-spacing:0.5px;}
  .detail-table td:last-child{border-right:none;}
  .detail-table td.right{text-align:right;font-family:var(--mono);font-weight:700;letter-spacing:1px;}
  .detail-table td.dim{color:var(--dim);}
  .detail-close{font-family:var(--font);font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:6px 14px;background:var(--ink);color:var(--bg);border:none;cursor:pointer;margin:10px 18px;transition:background 150ms;}
  .detail-close:hover{background:var(--orange);color:#fff;}
  .detail-header{padding:10px 18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:3px;display:flex;align-items:center;justify-content:space-between;}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <svg width="164" height="20" viewBox="0 0 328 41" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M65.4138 0H76.3161V24.2839C76.3161 31.1677 72.3342 37.047 65.8835 39.6833C59.4327 42.3195 52.4042 40.9378 47.4664 36.0712L39.752 28.4617L10.9023 0H26.3185L55.1682 28.4576L65.4096 38.5599V0H65.4138ZM317.098 0H328V24.2839C328 31.1677 324.018 37.047 317.567 39.6833C311.117 42.3195 304.088 40.9378 299.15 36.0712L291.436 28.4617L262.586 0V40.9993H251.684V0H278.002L306.852 28.4576L317.094 38.5599V0H317.098ZM158.077 0H147.175V24.2839C147.175 31.1677 151.157 37.047 157.607 39.6833C164.058 42.3195 171.087 40.9378 176.025 36.0712L183.739 28.4617L186.345 25.8911C186.914 32.0738 190.763 37.2561 196.703 39.6833C203.154 42.3195 210.182 40.9378 215.12 36.0712L222.834 28.4617L251.684 0H236.268L207.418 28.4576L197.177 38.5599V15.2067L212.589 0H197.172L168.323 28.4576L158.081 38.5599V0H158.077ZM133.55 9.40935H89.9408V31.59H133.55V9.40935ZM98.4574 0H125.029C135.724 0 144.448 8.60576 144.448 19.1549V21.8444C144.448 32.3936 135.724 40.9993 125.029 40.9993H98.4574C87.7629 40.9993 79.0386 32.3936 79.0386 21.8444V19.1549C79.0386 8.60576 87.7629 0 98.4574 0ZM0 0H10.9023V40.9993H0V0Z" fill="#1A1814"/>
    </svg>
  </div>
  <div class="header-right">
    <span class="timestamp" id="ts"></span>
    <button class="btn" onclick="loadData()">Refresh</button>
  </div>
</div>

<div class="hero-bar">
  <div class="hero-title">CASHFLOWS</div>
  <div class="hero-mid" id="status-bar">
    <div class="status-item"><span class="status-dot off"></span><span class="status-name">Dynamics</span></div>
    <div class="status-item"><span class="status-dot off"></span><span class="status-name">ClickUp</span></div>
    <div class="status-item"><span class="status-dot off"></span><span class="status-name">Exact</span></div>
  </div>
  <div class="hero-desc">12-month rolling forecast</div>
</div>

<div class="kpi-strip" id="kpis"></div>

<div class="controls-row">
  <span class="ctrl-label">Balance</span>
  <input type="text" class="bank-input" id="bank-input" placeholder="EUR" value="">
  <button class="ctrl-btn" onclick="loadData()" style="font-size:7px;padding:4px 8px">Set</button>
  <div class="ctrl-sep"></div>
  <span class="ctrl-label">Presets</span>
  <button class="ctrl-btn" onclick="applyPreset('conservative')">Conservative</button>
  <button class="ctrl-btn" onclick="applyPreset('likely')">Likely</button>
  <button class="ctrl-btn" onclick="applyPreset('full')">Full Forecast</button>
  <button class="ctrl-btn" onclick="applyPreset('weighted')">Weighted</button>
  <div class="ctrl-sep"></div>
  <span class="ctrl-label" id="toggle-area"></span>
</div>

<div class="controls-row" id="toggles"></div>

<div class="chart-section">
  <div class="chart-title">12-MONTH CASH POSITION</div>
  <div class="chart-subtitle">stacked inflows (up) and outflows (down) with derived cash position line</div>
  <div class="chart-canvas" id="chart"></div>
  <div class="chart-legend" id="legend"></div>
</div>

<div class="section-header">MONTHLY BREAKDOWN</div>
<div class="pnl-wrap"><table class="pnl-table" id="pnl-table"></table></div>

<div id="detail-panel" style="display:none"></div>

<script>
const API = window.location.origin;
const EUR = (n) => {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  const f = abs.toLocaleString('de-DE',{minimumFractionDigits:0,maximumFractionDigits:0});
  return (n < 0 ? '- ' : '') + 'EUR ' + f;
};
const SHORT = (n) => {
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1000000) return sign + 'EUR ' + (abs/1000000).toFixed(1) + 'M';
  if (abs >= 1000) return sign + 'EUR ' + Math.round(abs/1000) + 'K';
  return EUR(n);
};
const monthLabel = (mk) => {
  const [y,mo] = mk.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1] + ' ' + y.slice(2);
};
const shortMonth = (mk) => {
  const [y,mo] = mk.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(mo)-1];
};

// ─── State ──────────────────────────────────────────────────
let DATA = null;
let EXPANDED_MONTH = null; // which month is drilled down

let TOGGLES = {
  currentAr: true, billableAr: true,
  phase3: true,
  cogsWon: true, cogsPipeline: true,
  vat: true, overhead: true, weighted: false,
};

const SERIES = [
  { id:'currentAr',    label:'Current AR',     color:'#82D780',  type:'inflow' },
  { id:'billableAr',   label:'Billable AR',    color:'#0086D5',  type:'inflow' },
  { id:'phase3',       label:'Committed',      color:'#D8E1EB',  type:'inflow' },
  { id:'cogsWon',      label:'COGS (Won)',      color:'#887550',  type:'outflow' },
  { id:'cogsPipeline', label:'COGS (Pipeline)', color:'#BD6A55',  type:'outflow' },
  { id:'vat',          label:'VAT Returns',     color:'#8F9A8F',  type:'inflow' },
  { id:'overhead',     label:'Overhead',        color:'#F7E5DF',  type:'outflow' },
];

function applyPreset(name) {
  const all = (v) => { for (const k in TOGGLES) TOGGLES[k] = v; };
  switch(name) {
    case 'conservative':
      all(true); TOGGLES.phase3=false; TOGGLES.cogsPipeline=false; TOGGLES.weighted=false; break;
    case 'likely':
      all(true); TOGGLES.weighted=false; break;
    case 'full':
      all(true); TOGGLES.weighted=false; break;
    case 'weighted':
      all(true); TOGGLES.weighted=true; break;
  }
  render();
}

function renderToggles() {
  const el = document.getElementById('toggles');
  let html = '<span class="ctrl-label">Inflows</span>';
  SERIES.filter(s=>s.type==='inflow' && s.id!=='vat').forEach(s => {
    html += `<button class="ctrl-btn ${TOGGLES[s.id]?'active':''}" onclick="toggle('${s.id}')"><span class="dot" style="background:${s.color}"></span>${s.label}</button>`;
  });
  html += '<div class="ctrl-sep"></div><span class="ctrl-label">Outflows</span>';
  SERIES.filter(s=>s.type==='outflow').forEach(s => {
    html += `<button class="ctrl-btn ${TOGGLES[s.id]?'active':''}" onclick="toggle('${s.id}')"><span class="dot" style="background:${s.color}"></span>${s.label}</button>`;
  });
  const vatS = SERIES.find(s=>s.id==='vat');
  html += `<button class="ctrl-btn ${TOGGLES.vat?'active':''}" onclick="toggle('vat')"><span class="dot" style="background:${vatS.color}"></span>${vatS.label}</button>`;
  html += '<div class="ctrl-sep"></div>';
  html += `<button class="ctrl-btn ${TOGGLES.weighted?'active':''}" onclick="toggle('weighted')" style="border-color:var(--orange)">Weighted</button>`;
  el.innerHTML = html;
}

function toggle(id) { TOGGLES[id] = !TOGGLES[id]; render(); }

function computeMonths() {
  if (!DATA) return [];
  const w = TOGGLES.weighted;
  return DATA.months.map(m => {
    const cAr = TOGGLES.currentAr ? m.currentAr : 0;
    const bAr = TOGGLES.billableAr ? m.billableAr : 0;
    const p3 = TOGGLES.phase3 ? (w ? m.pipelinePhase3 * 0.90 : m.pipelinePhase3) : 0;
    const vat = TOGGLES.vat ? m.vatReturn : 0;
    const inflow = cAr + bAr + p3 + vat;

    const cW = TOGGLES.cogsWon ? m.cogsWon : 0;
    let cP = 0;
    if (TOGGLES.cogsPipeline && TOGGLES.phase3) cP = w ? m.cogsPhase3 * 0.90 : m.cogsPhase3;
    const oh = TOGGLES.overhead ? m.overhead : 0;
    const outflow = cW + cP + oh;

    return {
      month: m.month,
      currentAr: cAr, billableAr: bAr, committed: p3,
      cogsWon: cW, cogsPipeline: cP, vat, overhead: oh,
      inflow, outflow, net: inflow - outflow,
      // Raw items for drill-down
      _raw: m,
    };
  });
}

function render() {
  if (!DATA) return;
  renderToggles();
  const computed = computeMonths();
  renderKPIs(computed);
  renderChart(computed);
  renderPNL(computed);
  renderLegend();
}

function renderKPIs(computed) {
  const bank = DATA.bankBalance;
  const totIn = computed.reduce((s,m)=>s+m.inflow,0);
  const totOut = computed.reduce((s,m)=>s+m.outflow,0);
  const m3 = computed.slice(0,3).reduce((s,m)=>s+m.net,0);
  const endPos = bank + computed.reduce((s,m)=>s+m.net,0);

  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="kpi-label">Opening Balance</div><div class="kpi-value">${SHORT(bank)}</div><div class="kpi-caption">${DATA.bankBalanceSource==='manual'?'manual entry':'from exact online'}</div></div>
    <div class="kpi"><div class="kpi-label">3-Month Position</div><div class="kpi-value">${SHORT(bank+m3)}</div><div class="kpi-caption">cash in 3 months</div></div>
    <div class="kpi"><div class="kpi-label">12-Month End</div><div class="kpi-value">${SHORT(endPos)}</div><div class="kpi-caption">projected position</div></div>
    <div class="kpi"><div class="kpi-label">Total Inflows</div><div class="kpi-value">${SHORT(totIn)}</div><div class="kpi-caption">active series</div></div>
    <div class="kpi"><div class="kpi-label">Total Outflows</div><div class="kpi-value">${SHORT(totOut)}</div><div class="kpi-caption">active series</div></div>
    <div class="kpi"><div class="kpi-label">12M Net</div><div class="kpi-value">${SHORT(totIn-totOut)}</div><div class="kpi-caption">inflows - outflows</div></div>
  `;
}

function renderChart(computed) {
  const el = document.getElementById('chart');
  el.innerHTML = '';
  const H = 400, W = el.offsetWidth || 800;
  let maxIn=0, maxOut=0;
  computed.forEach(m => { maxIn=Math.max(maxIn,m.inflow); maxOut=Math.max(maxOut,m.outflow); });
  let cash=DATA.bankBalance, cashMax=cash;
  computed.forEach(m => { cash+=m.net; cashMax=Math.max(cashMax,cash); });

  const totalRange = Math.max(maxIn, cashMax) + maxOut + 1;
  const zeroY = (Math.max(maxIn, cashMax) / totalRange) * H;
  const scale = H / totalRange;

  const maxVal = Math.max(maxIn, maxOut);
  const tickStep = maxVal > 0 ? Math.pow(10, Math.floor(Math.log10(maxVal))) : 100000;
  const niceStep = maxVal / tickStep > 5 ? tickStep * 2 : tickStep;

  for (let v=niceStep; v<=maxIn*1.1; v+=niceStep) { const y=zeroY-v*scale; if(y<0)break; el.innerHTML+=`<div class="y-tick" style="top:${y}px">${SHORT(v)}</div><div class="grid-h" style="top:${y}px"></div>`; }
  for (let v=niceStep; v<=maxOut*1.1; v+=niceStep) { const y=zeroY+v*scale; if(y>H)break; el.innerHTML+=`<div class="y-tick" style="top:${y}px">${SHORT(-v)}</div><div class="grid-h" style="top:${y}px"></div>`; }
  el.innerHTML += `<div class="zero-line" style="top:${zeroY}px"></div><div class="y-tick" style="top:${zeroY}px;font-weight:700">0</div>`;

  const n=computed.length, barW=Math.min(40,(W/n)-8), step=W/n;
  computed.forEach((m,i) => {
    const x = i*step+step/2;
    [{val:m.currentAr,c:'#82D780'},{val:m.billableAr,c:'#0086D5'},{val:m.committed,c:'#D8E1EB'},{val:m.vat,c:'#8F9A8F'}].filter(p=>p.val>0).reduce((cum,p)=>{
      const h=p.val*scale; el.innerHTML+=`<div class="bar-seg" style="left:${x-barW/2}px;top:${zeroY-cum-h}px;width:${barW}px;height:${h}px;background:${p.c};border:1px solid var(--ink)" title="${EUR(p.val)}"></div>`; return cum+h;
    },0);
    [{val:m.cogsWon,c:'#887550'},{val:m.cogsPipeline,c:'#BD6A55'},{val:m.overhead,c:'#F7E5DF'}].filter(p=>p.val>0).reduce((cum,p)=>{
      const h=p.val*scale; el.innerHTML+=`<div class="bar-seg" style="left:${x-barW/2}px;top:${zeroY+cum}px;width:${barW}px;height:${h}px;background:${p.c};border:1px solid var(--ink)" title="${EUR(-p.val)}"></div>`; return cum+h;
    },0);
    el.innerHTML+=`<div class="month-label" style="left:${x}px">${shortMonth(m.month)}</div>`;
  });

  cash=DATA.bankBalance;
  const pts=computed.map((m,i)=>{ cash+=m.net; return {x:i*step+step/2, y:zeroY-cash*scale, cash}; });
  const startY=zeroY-DATA.bankBalance*scale;
  let d=`M ${pts[0].x-step/2} ${startY}`; pts.forEach(p=>{d+=` L ${p.x} ${p.y}`;});
  let svg=`<svg class="line-overlay" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="#1A1814" stroke-width="2.5"/>`;
  pts.forEach(p=>{svg+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#1A1814" stroke="#EAE6DF" stroke-width="1.5"/>`;});
  svg+=`</svg>`; el.innerHTML+=svg;
  el.innerHTML+=`<div style="position:absolute;left:${pts[0].x-step/2-4}px;top:${startY-16}px;font-size:9px;font-weight:700;font-family:var(--mono);letter-spacing:1px">${SHORT(DATA.bankBalance)}</div>`;
  const lp=pts[pts.length-1];
  el.innerHTML+=`<div style="position:absolute;left:${lp.x+6}px;top:${lp.y-6}px;font-size:9px;font-weight:700;font-family:var(--mono);letter-spacing:1px">${SHORT(lp.cash)}</div>`;
}

function renderLegend() {
  const el = document.getElementById('legend');
  let html='';
  SERIES.forEach(s=>{ if(TOGGLES[s.id]) html+=`<div class="legend-item"><div class="legend-dot" style="background:${s.color};border:var(--grid)"></div>${s.label}</div>`; });
  html+=`<div class="legend-item"><div class="legend-dot" style="background:var(--ink)"></div>Cash Position</div>`;
  el.innerHTML=html;
}

// ─── P&L Table (months as columns) ──────────────────────────
function renderPNL(computed) {
  const tbl = document.getElementById('pnl-table');
  const months = computed;
  const v = (n,forecast) => n > 0 ? `<span class="${forecast?'forecast':''}">${EUR(n)}</span>` : (n < 0 ? EUR(n) : '<span class="ghost">—</span>');

  // Running cash
  let cashByMonth = [];
  let cash = DATA.bankBalance;
  months.forEach(m => { cash += m.net; cashByMonth.push(cash); });

  // Totals
  const tot = (fn) => months.reduce((s,m)=>s+fn(m),0);

  // Rows definition (P&L style)
  const rows = [
    { label:'Current AR',  fn:m=>m.currentAr,  forecast:false },
    { label:'Billable AR', fn:m=>m.billableAr,  forecast:false },
    { label:'Committed',   fn:m=>m.committed,   forecast:true },
    { label:'Total Inflow', fn:m=>m.inflow, sep:true },
    { label:'COGS',        fn:m=>-(m.cogsWon+m.cogsPipeline), forecast:false },
    { label:'VAT Returns', fn:m=>m.vat, forecast:false },
    { label:'Overhead',    fn:m=>-m.overhead, forecast:false },
    { label:'Total Outflow', fn:m=>-m.outflow, sep:true },
    { label:'Net',         fn:(m,i)=>m.net, sep:true },
    { label:'Cash Position', fn:(m,i)=>cashByMonth[i], total:true },
  ];

  let html = '<thead><tr><th class="row-hdr"></th>';
  months.forEach((m,i) => {
    const exp = EXPANDED_MONTH === m.month ? ' expanded' : '';
    html += `<th class="month-hdr${exp}" onclick="drillDown('${m.month}')">${shortMonth(m.month)}</th>`;
  });
  html += '<th class="total-hdr">Total</th></tr></thead><tbody>';

  rows.forEach(row => {
    const cls = row.sep ? ' class="row-sep"' : row.total ? ' class="row-total"' : '';
    html += `<tr${cls}><td>${row.label}</td>`;
    months.forEach((m,i) => {
      const val = row.fn(m,i);
      const fc = row.forecast ? 'forecast' : '';
      html += `<td class="${fc}">${v(val,row.forecast)}</td>`;
    });
    // Total column
    if (row.total) {
      html += `<td>${EUR(cashByMonth[cashByMonth.length-1])}</td>`;
    } else {
      const t = months.reduce((s,m,i)=>s+row.fn(m,i),0);
      html += `<td>${v(t,row.forecast)}</td>`;
    }
    html += '</tr>';
  });

  html += '</tbody>';
  tbl.innerHTML = html;
}

// ─── Month Drill-Down ───────────────────────────────────────
function drillDown(monthKey) {
  const panel = document.getElementById('detail-panel');

  if (EXPANDED_MONTH === monthKey) {
    EXPANDED_MONTH = null;
    panel.style.display = 'none';
    panel.innerHTML = '';
    render();
    return;
  }

  EXPANDED_MONTH = monthKey;
  const m = DATA.months.find(m => m.month === monthKey);
  if (!m) return;

  let html = `<div class="detail-section">`;
  html += `<div class="detail-header"><span>DETAIL — ${monthLabel(monthKey)}</span><button class="detail-close" onclick="drillDown('${monthKey}')">Close</button></div>`;

  // Current AR items
  if (m.currentArItems && m.currentArItems.length > 0) {
    html += `<div style="padding:8px 18px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--sub);border-bottom:1px solid var(--ghost)">Current AR — ${m.currentArItems.length} invoices</div>`;
    html += `<table class="detail-table"><thead><tr><th>Customer</th><th>Invoice</th><th>Job No.</th><th>Due Date</th><th class="right">Amount</th></tr></thead><tbody>`;
    m.currentArItems.forEach(item => {
      html += `<tr><td>${item.projectName}</td><td class="dim">${item.label}</td><td class="dim">${item.jobNo||'—'}</td><td class="dim">${new Date(item.expectedDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'})}</td><td class="right">${EUR(item.amount)}</td></tr>`;
    });
    html += '</tbody></table>';
  }

  // Billable AR items
  if (m.billableArItems && m.billableArItems.length > 0) {
    html += `<div style="padding:8px 18px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--sub);border-bottom:1px solid var(--ghost);border-top:var(--grid)">Billable AR — ${m.billableArItems.length} milestones</div>`;
    html += `<table class="detail-table"><thead><tr><th>Project</th><th>Type</th><th>Job No.</th><th>Milestone</th><th>Status</th><th class="right">Amount</th></tr></thead><tbody>`;
    m.billableArItems.forEach(item => {
      html += `<tr><td>${item.projectName}</td><td>${item.projectType}</td><td class="dim">${item.jobNo||'—'}</td><td class="dim">${item.label||'—'}</td><td class="dim">${item.status}</td><td class="right">${EUR(item.amount)}</td></tr>`;
    });
    html += '</tbody></table>';
  }

  // Committed (Phase 3) items
  if (m.pipelinePhase3Items && m.pipelinePhase3Items.length > 0) {
    html += `<div style="padding:8px 18px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--sub);border-bottom:1px solid var(--ghost);border-top:var(--grid)">Committed Pipeline — ${m.pipelinePhase3Items.length} milestones</div>`;
    html += `<table class="detail-table"><thead><tr><th>Opportunity</th><th>Type</th><th>Milestone</th><th>Trigger</th><th class="right">Amount</th></tr></thead><tbody>`;
    m.pipelinePhase3Items.forEach(item => {
      html += `<tr><td>${item.projectName}</td><td>${item.projectType}</td><td class="dim">${item.label||'—'}</td><td class="dim">${item.trigger||'—'}</td><td class="right">${EUR(item.amount)}</td></tr>`;
    });
    html += '</tbody></table>';
  }

  if ((!m.currentArItems || m.currentArItems.length===0) && (!m.billableArItems || m.billableArItems.length===0) && (!m.pipelinePhase3Items || m.pipelinePhase3Items.length===0)) {
    html += `<div style="padding:20px 18px;font-size:9px;font-weight:300;color:var(--dim)">no detail items for this month</div>`;
  }

  html += '</div>';
  panel.innerHTML = html;
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  render();
}

// ─── Data Load ──────────────────────────────────────────────
async function loadData() {
  document.getElementById('ts').textContent = 'last updated: ' + new Date().toLocaleString('nl-NL').toLowerCase();
  const bankVal = document.getElementById('bank-input').value.trim();
  const params = bankVal ? `?bankBalance=${encodeURIComponent(bankVal)}` : '';
  try {
    const res = await fetch(`${API}/api/dashboard/cash-position${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    DATA = json;
    if (!bankVal && DATA.bankBalance > 0) document.getElementById('bank-input').value = Math.round(DATA.bankBalance);
    render();
  } catch(e) {
    document.getElementById('kpis').innerHTML = `<div class="kpi" style="grid-column:span 6"><div class="kpi-label">Error</div><div class="kpi-value" style="font-size:11px">${e.message}</div></div>`;
  }
}

async function loadStatus() {
  try {
    const res = await fetch(`${API}/api/dashboard/status`);
    if (!res.ok) return;
    const s = await res.json();
    if (s.error) return;
    const el = document.getElementById('status-bar');
    const dOk = s.dynamics.connected && s.dynamics.tokenValid;
    const cOk = s.clickup.connected && s.clickup.projectsSynced > 0;
    const eOk = s.exact.connected && s.exact.tokenValid;
    el.innerHTML = `
      <div class="status-item"><span class="status-dot ${dOk?'ok':'off'}"></span><span class="status-name">Dynamics</span><span class="status-detail">${dOk?s.dynamics.projectsSynced+' opps':'disconnected'}</span><button class="sync-btn" onclick="runSync('dynamics')">Sync</button></div>
      <div class="status-item"><span class="status-dot ${cOk?'ok':'off'}"></span><span class="status-name">ClickUp</span><span class="status-detail">${cOk?s.clickup.projectsSynced+' projects':'no data'}</span><button class="sync-btn" onclick="runSync('clickup')">Sync</button></div>
      <div class="status-item"><span class="status-dot ${eOk?'ok':'off'}"></span><span class="status-name">Exact</span><span class="status-detail">${eOk?'AR '+s.exact.arItems.total+' items':'disconnected'}</span><button class="sync-btn" onclick="runSync('exact')">Sync</button></div>
    `;
  } catch(e) {}
}

async function runSync(provider) {
  const btn = event.target; btn.textContent='...'; btn.disabled=true;
  try {
    const res = await fetch(`${API}/api/sync/${provider}`,{method:'POST'});
    const data = await res.json();
    btn.textContent = data.error ? 'ERR' : 'OK';
    setTimeout(()=>{ btn.textContent='Sync'; btn.disabled=false; loadStatus(); loadData(); }, 1000);
  } catch(e) { btn.textContent='ERR'; setTimeout(()=>{btn.textContent='Sync';btn.disabled=false;},2000); }
}

loadStatus();
loadData();
</script>
